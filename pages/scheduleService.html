<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../styles.css">
    
    
</head>
<body>
    <header>
        <div id="logo"><a href="../index.html">HOME</a></div>
        <div id="businessName"> <p>G & L</p>
        <p>pick up and delivery</p> </div>
        <div id="burgerMenu">MENU</div>
            
    </header>
            
    <div id="banner">
                          
        <div id="circleDiv">
            <h1 id="perLb">$0.60 / lb</h1>
            <div id="underline1"></div>
            <p>Customer's first order includes free additional bag!</p>
        </div>
                
    </div>
    <section id="formSection">
        <form action="" id="form">
            <h1 id="scheduleFormHeader"></h1>
            <input type="text" placeholder="Full Name" required>
            <input type="text" placeholder="Pick up address" required>
            <input type="text" placeholder="Laundry Address" required>
            <input type="number" placeholder="Bag Count" required>
            <button id="scheduleBtn"></button>
        </form>

       
        <div id="cardContainer">
            <button id="pickup-only" class="serviceCards">
                <h1>Pick-up ONLY</h1>
            </button>
            <button id="pickup-delivery" class="serviceCards">
                <h1>Pick-up & Deliver</h1>
            </button>
        </div>
        
    </section>

    



    <footer>&copy; All Rights Reserved</footer>
    <script  src="../schedule.js"></script>
</body>
</html>
